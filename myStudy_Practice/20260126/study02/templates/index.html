<!DOCTYPE html>
<html>

<head>
    <title>FastAPI 실시간 채팅</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        #messages {
            list-style-type: none;
            padding: 0;
            border: 1px solid #ccc;
            height: 200px;
            overflow-y: scroll;
            margin-bottom: 10px;
        }

        #messages li {
            padding: 5px 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>
    <h1>WebSocket Chat</h1>
    <ul id="messages"></ul>
    <input type="text" id="messageText" placeholder="메시지를 입력하세요..." autocomplete="off" />
    <button onclick="sendMessage()">전송</button>

    <script>
        // 현재 브라우저의 호스트와 포트를 자동으로 감지하여 연결합니다. (23306 포트 문제 해결)
        const host = window.location.host;
        const ws = new WebSocket(`ws://${host}/ws`);

        ws.onmessage = function (event) {
            const messages = document.getElementById('messages');
            const message = document.createElement('li');
            message.textContent = event.data;
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight; // 새 메시지 오면 아래로 스크롤
        };

        function sendMessage() {
            const input = document.getElementById("messageText");
            if (input.value.trim() !== "") {
                ws.send(input.value);
                input.value = '';
            }
        }

        // 엔터키 지원
        document.getElementById("messageText").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>

</html>
